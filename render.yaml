services:
  - type: web
    name: cocorapado-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        sync: false # Aquí pondrás la URL que te tire vercel

databases:
  - name: cocorapado-db
    databaseName: cocorapado
    user: admin
    plan: free
